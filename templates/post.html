{% extends "base.html" %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}
    <h1>{{ post.title }}</h1>
    <div class="meta">作者: {{ post.author.username }} | {{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</div>
    <hr>
    <div class="post-content">{{ post.content }}</div>
{% endblock %}
