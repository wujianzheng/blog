<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}我的博客{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; color: #333; }
        nav { background: #333; color: #fff; padding: 1rem; }
        nav a { color: #fff; text-decoration: none; margin-right: 1rem; }
        nav .user { float: right; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .flash { background: #d4edda; color: #155724; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; }
        .post { border-bottom: 1px solid #eee; padding: 1rem 0; }
        .post h2 { margin-bottom: 0.5rem; }
        .post a { color: #333; text-decoration: none; }
        .post .meta { color: #888; font-size: 0.9rem; }
        .content { margin-top: 0.5rem; }
        input, textarea { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; }
        textarea { height: 200px; }
        button { background: #333; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        button:hover { background: #555; }
        .post-content { white-space: pre-wrap; }
    </style>
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}">首页</a>
        {% if session.get('user_id') %}
            <a href="{{ url_for('create') }}">发布文章</a>
            <span class="user">{{ session.get('username') }} | <a href="{{ url_for('logout') }}">退出</a></span>
        {% else %}
            <span class="user"><a href="{{ url_for('login') }}">登录</a> | <a href="{{ url_for('register') }}">注册</a></span>
        {% endif %}
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
